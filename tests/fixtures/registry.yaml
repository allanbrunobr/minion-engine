# Test registry for prompt resolver integration tests
stacks:
  rust:
    name: rust
    markers:
      - Cargo.toml
    tools:
      lint: "cargo clippy -- -D warnings"
      test: "cargo test"
      install: "cargo build"

  java:
    name: java
    markers:
      - pom.xml
      - build.gradle
    tools:
      lint: "mvn checkstyle:check"
      test: "mvn test"
      install: "mvn install -DskipTests"

  java-spring:
    name: java-spring
    parent: java
    markers:
      - pom.xml
    tools:
      lint: "mvn checkstyle:check"
      test: "mvn test"
      install: "mvn install -DskipTests"

  python:
    name: python
    markers:
      - pyproject.toml
      - setup.py
      - requirements.txt
    tools:
      lint: "ruff check ."
      test: "pytest"
      install: "pip install -e ."

  typescript:
    name: typescript
    markers:
      - tsconfig.json
    tools:
      lint: "npx eslint . --ext .ts"
      test: "npx jest"
      install: "npm install"

  react:
    name: react
    parent: typescript
    markers:
      - package.json
    tools:
      lint: "npx eslint . --ext .ts,.tsx"
      test: "npx jest"
      install: "npm install"

  javascript:
    name: javascript
    markers:
      - package.json
    tools:
      lint: "npx eslint ."
      test: "npx jest"
      install: "npm install"
