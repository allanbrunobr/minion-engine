# Test registry for prompt resolver integration tests
version: 1
detection_order:
  - react
  - java-spring
  - java
  - typescript
  - javascript
  - python
  - rust

stacks:
  _default:
    tools:
      lint: "echo 'no linter'"
      test: "echo 'no test'"
      install: "echo 'no install'"

  rust:
    parent: _default
    file_markers:
      - Cargo.toml
    tools:
      lint: "cargo clippy -- -D warnings"
      test: "cargo test"
      install: "cargo build"

  java:
    parent: _default
    file_markers:
      - pom.xml
      - build.gradle
    tools:
      lint: "mvn checkstyle:check"
      test: "mvn test"
      install: "mvn install -DskipTests"

  java-spring:
    parent: java
    file_markers:
      - pom.xml
    content_match:
      pom.xml: "spring-boot"
    tools:
      lint: "mvn checkstyle:check"
      test: "mvn test"
      install: "mvn install -DskipTests"

  python:
    parent: _default
    file_markers:
      - pyproject.toml
      - setup.py
      - requirements.txt
    tools:
      lint: "ruff check ."
      test: "pytest"
      install: "pip install -e ."

  typescript:
    parent: javascript
    file_markers:
      - tsconfig.json
    tools:
      lint: "npx eslint . --ext .ts"
      test: "npx jest"
      install: "npm install"

  react:
    parent: typescript
    file_markers:
      - package.json
    content_match:
      package.json: "react"
    tools:
      lint: "npx eslint . --ext .ts,.tsx"
      test: "npx jest"
      install: "npm install"

  javascript:
    parent: _default
    file_markers:
      - package.json
    tools:
      lint: "npx eslint ."
      test: "npx jest"
      install: "npm install"
