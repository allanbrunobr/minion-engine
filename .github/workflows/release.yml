name: Release

# Trigger on version tags (e.g., v0.1.0)
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: minion

jobs:
  # ──────────────────────────────────────────────────────────
  # Build pre-compiled binaries for all supported targets
  # ──────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: minion-linux-x86_64

          # Linux aarch64 (cross-compile)
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: minion-linux-aarch64
            cross: true

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: minion-macos-x86_64

          # macOS aarch64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: minion-macos-aarch64

          # Windows x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: minion-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install cross for Linux aarch64 cross-compilation
      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build binary (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build binary (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      # Rename binary to include platform suffix
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} \
             ${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe `
             ${{ matrix.artifact_name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  # ──────────────────────────────────────────────────────────
  # Create GitHub Release and attach all binaries
  # ──────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download all build artifacts into ./artifacts/
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      # Compute SHA256 checksums for all binaries
      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f | sort | while read f; do
            sha256sum "$f" >> ../checksums.sha256
          done
          cat ../checksums.sha256

      # Create GitHub Release with all binaries and checksums
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Minion Engine ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/**/*
            checksums.sha256
          body: |
            ## Installation

            ### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/minion-macos-aarch64 -o minion
            chmod +x minion
            sudo mv minion /usr/local/bin/
            ```

            ### macOS (Intel)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/minion-macos-x86_64 -o minion
            chmod +x minion
            sudo mv minion /usr/local/bin/
            ```

            ### Linux (x86_64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/minion-linux-x86_64 -o minion
            chmod +x minion
            sudo mv minion /usr/local/bin/
            ```

            ### Linux (aarch64)
            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/minion-linux-aarch64 -o minion
            chmod +x minion
            sudo mv minion /usr/local/bin/
            ```

            ### Windows (x86_64)
            Download `minion-windows-x86_64.exe` and add to your PATH.

            ### Via cargo
            ```bash
            cargo install minion-engine
            ```

            ## Verify installation
            ```bash
            minion --version
            ```

            ## Verify checksums
            ```bash
            sha256sum -c checksums.sha256
            ```
