# ============================================================
# code-review.yaml — Automated Code Review Workflow
# ============================================================
#
# Usage:
#   minion execute workflows/code-review.yaml --target <PR_NUMBER>
#   minion execute workflows/code-review.yaml --target <BRANCH>
#
# What it does:
#   1. Fetches the diff for the given PR or branch
#   2. Identifies changed files
#   3. For each file:
#      a. Detects the language (Python, TypeScript, Rust, etc.)
#      b. Loads the language-specific review prompt
#      c. Reads project context (CLAUDE.md / ARCHITECTURE.md)
#      d. Reviews the file diff with full architectural awareness
#   4. Consolidates findings into a structured summary
#   5. Posts the summary as a PR comment (if PR number given)
#
# Requirements:
#   - gh CLI authenticated
#   - ANTHROPIC_API_KEY set (for chat steps)
# ============================================================

name: code-review
version: 1
description: "Review a PR or branch diff with AI — produces a structured findings report"

config:
  global:
    timeout: 300s
    working_directory: "."

  agent:
    command: claude
    flags: ["-p", "--output-format", "stream-json"]
    permissions: skip
    model: claude-sonnet-4-20250514

  chat:
    provider: anthropic
    model: claude-sonnet-4-20250514
    api_key_env: ANTHROPIC_API_KEY
    temperature: 0.2
    max_tokens: 4096

  cmd:
    fail_on_error: false
    timeout: 60s
    shell: "/bin/zsh"

prompts_dir: ./prompts

scopes:
  # ── Review a single file ────────────────────────────────
  # scope.value = file path
  # Detects the language from the file extension, loads the
  # matching prompt (prompts/code-review/{lang}.md.tera), and
  # uses it to guide the review.
  review_file:
    steps:
      - name: detect_lang
        type: cmd
        run: |
          file="{{ scope.value }}"
          ext="${file##*.}"
          case "$ext" in
            py) printf "python" ;;
            ts|tsx) printf "typescript" ;;
            rs) printf "rust" ;;
            java) printf "java" ;;
            jsx) printf "react" ;;
            js) printf "javascript" ;;
            *) printf "_default" ;;
          esac

      - name: load_prompt
        type: cmd
        run: |
          lang="{{ steps.detect_lang.stdout }}"
          pf="prompts/code-review/${lang}.md.tera"
          if [ ! -f "$pf" ]; then
            pf="prompts/code-review/_default.md.tera"
          fi
          sed '/^## Diff/,$d' "$pf"

      - name: project_context
        type: cmd
        run: |
          if [ -f "CLAUDE.md" ]; then
            cat CLAUDE.md
          elif [ -f "ARCHITECTURE.md" ]; then
            cat ARCHITECTURE.md
          elif [ -f "README.md" ]; then
            head -200 README.md
          else
            echo ""
          fi

      - name: file_diff
        type: cmd
        run: "git diff {{ target }}...HEAD -- {{ scope.value }} 2>/dev/null || git diff HEAD~1 -- {{ scope.value }}"

      - name: review
        type: chat
        prompt: |
          You are reviewing the file `{{ scope.value }}` (detected language: {{ steps.detect_lang.stdout }}).

          {{ steps.load_prompt.stdout }}

          ## Project Architecture Context
          Use this to understand the project structure and conventions when evaluating the changes:
          {{ steps.project_context.stdout }}

          ## Diff
          {{ steps.file_diff.stdout }}

    outputs: "{{ steps.review.response }}"

steps:
  # 1. Get the diff — support both PR number and branch name
  - name: get_diff
    type: cmd
    run: |
      if echo "{{ target }}" | grep -qE '^[0-9]+$'; then
        # It's a PR number
        gh pr diff {{ target }} 2>/dev/null
      else
        # It's a branch name
        git diff {{ target }}...HEAD
      fi

  # 2. Find changed files
  - name: changed_files
    type: cmd
    run: |
      if echo "{{ target }}" | grep -qE '^[0-9]+$'; then
        gh pr diff {{ target }} --name-only 2>/dev/null
      else
        git diff --name-only {{ target }}...HEAD
      fi

  # 3. Gate: ensure there are files to review
  - name: check_files
    type: gate
    condition: "{{ steps.changed_files.stdout | length > 0 }}"
    on_fail: fail
    message: "No changed files found — nothing to review"

  # 4. Review each changed file in parallel
  - name: file_reviews
    type: map
    scope: review_file
    items: "{{ steps.changed_files.stdout }}"
    parallel: 4
    config:
      collect: text

  # 5. Consolidate all reviews into a final report
  - name: summary
    type: chat
    prompt: |
      You are a tech lead consolidating code review findings.

      Below are per-file reviews from individual reviewers. Synthesize them into a
      single structured report with these sections:

      ## 🔴 Critical Issues (must fix before merge)
      ## 🟡 Medium Issues (should fix)
      ## 🟢 Low Issues (consider fixing)
      ## ✅ Summary

      Remove duplicate findings. Be concise. Include file name and line number for each issue.

      ## Per-file reviews:
      {{ steps.file_reviews.stdout }}

  # 6. Post comment on PR (if target is a PR number)
  #    Uses --body-file with a temp file to avoid shell escaping issues
  #    with AI-generated content (backticks, quotes, emojis, etc.)
  - name: post_comment
    type: cmd
    run: |
      if echo "{{ target }}" | grep -qE '^[0-9]+$'; then
        cat > /tmp/minion-review.md <<'REVIEW_EOF'
      ## 🤖 Minion Code Review

      {{ steps.summary.response }}

      ---
      *Generated by [Minion Engine](https://github.com/allanbrunobr/minion-engine)*
      REVIEW_EOF
        gh pr comment {{ target }} --body-file /tmp/minion-review.md
        rm -f /tmp/minion-review.md
      else
        echo "Branch review — not posting PR comment"
      fi

  # 7. Print the final report to terminal
  #    Uses heredoc to avoid shell escaping issues with AI content
  - name: report
    type: cmd
    run: |
      cat <<'REPORT_EOF'
      ============================================================
       Code Review Complete
      ============================================================
      {{ steps.summary.response }}
      REPORT_EOF
