name: simple-test
version: 1
description: "Simple workflow for testing the engine with echo commands"

steps:
  - name: greet
    type: cmd
    run: "echo 'Hello from Minion Engine!'"

  - name: show_target
    type: cmd
    run: "echo 'Target: {{ target }}'"

  - name: list_files
    type: cmd
    run: "ls -la"
    config:
      fail_on_error: false
