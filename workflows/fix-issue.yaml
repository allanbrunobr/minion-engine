name: fix-github-issue
version: 1
description: "Fetch a GitHub issue, plan, implement, validate, and create a PR"

config:
  global:
    timeout: 300s
  agent:
    command: claude
    flags: ["-p", "--output-format", "stream-json"]
    permissions: skip
    model: claude-sonnet-4-20250514
  cmd:
    fail_on_error: true
    timeout: 60s
    shell: "/bin/zsh"

scopes:
  lint_fix:
    steps:
      - name: lint
        type: cmd
        run: "npm run lint 2>&1 || cargo clippy 2>&1"
        config:
          fail_on_error: false

      - name: check_lint
        type: gate
        condition: "{{ steps.lint.exit_code == 0 }}"
        on_pass: break
        message: "Lint passed"

      - name: fix_lint
        type: agent
        prompt: |
          Fix ONLY these lint errors. Do not change any logic.
          Do not add new features. Just fix the errors:

          {{ steps.lint.stdout }}

  test_fix:
    steps:
      - name: test
        type: cmd
        run: "npm test 2>&1 || cargo test 2>&1"
        config:
          fail_on_error: false
          timeout: 300s

      - name: check_test
        type: gate
        condition: "{{ steps.test.exit_code == 0 }}"
        on_pass: break
        message: "Tests passed"

      - name: fix_test
        type: agent
        prompt: |
          Fix ONLY these test failures. Do not modify test expectations
          unless the test is clearly wrong:

          {{ steps.test.stdout }}

steps:
  # 1. Context Curation (deterministic)
  - name: fetch_issue
    type: cmd
    run: >
      gh issue view {{ target }}
      --json title,body,comments,labels
      -q '{title: .title, body: .body, labels: [.labels[].name],
           comments: [.comments[].body]}'

  - name: find_relevant_files
    type: cmd
    run: >
      gh issue view {{ target }} --json body -q .body |
      grep -oE '[a-zA-Z0-9_/]+\.(ts|js|py|rs|rb)' |
      sort -u | head -20
    config:
      fail_on_error: false

  - name: read_project_rules
    type: cmd
    run: "cat CLAUDE.md 2>/dev/null || cat .cursorrules 2>/dev/null || echo 'No rules found'"
    config:
      fail_on_error: false

  # 2. Planning (agentic — uses Claude Code for planning)
  - name: plan
    type: agent
    prompt: |
      You are a senior software architect. Create a detailed
      implementation plan for the following GitHub issue.

      ## Issue
      {{ steps.fetch_issue.stdout }}

      ## Relevant Files
      {{ steps.find_relevant_files.stdout }}

      ## Project Rules
      {{ steps.read_project_rules.stdout }}

      ## Instructions
      - List each file to modify/create
      - For each file, describe the exact changes
      - Include test strategy
      - Be specific, not vague

      Output a structured plan in markdown.

  # 3. Plan Validation (deterministic gate)
  - name: validate_plan
    type: gate
    condition: "{{ steps.plan.response | length > 100 }}"
    on_fail: fail
    message: "Plan too short or empty — aborting"

  # 4. Implementation (agentic — Claude Code full)
  - name: implement
    type: agent
    prompt: |
      Implement the following plan exactly as specified.
      Do NOT run tests, lint, or any validation commands.
      Just write the code.

      ## Plan
      {{ steps.plan.response }}

      ## Project Rules
      {{ steps.read_project_rules.stdout }}
    config:
      timeout: 600s

  # 4. Lint Gate (deterministic + retry agentic)
  - name: lint_gate
    type: repeat
    scope: lint_fix
    max_iterations: 3

  # 5. Test Gate (deterministic + retry agentic)
  - name: test_gate
    type: repeat
    scope: test_fix
    max_iterations: 2

  # 6. Create PR (deterministic)
  - name: extract_issue_id
    type: cmd
    run: "echo '{{ target }}' | grep -oE '[0-9]+$'"

  - name: create_branch
    type: cmd
    run: "git checkout -b minion/issue-{{ steps.extract_issue_id.stdout | trim }}-$(date +%s)"

  - name: commit
    type: cmd
    run: |
      git add -A
      git commit -m "fix: resolve issue #{{ steps.extract_issue_id.stdout | trim }}

      Implemented by Minion Engine"

  - name: push
    type: cmd
    run: "git push -u origin HEAD"

  - name: write_pr_body
    type: cmd
    run: |
      cat > /tmp/pr_body.md << 'ENDOFBODY'
      ## Summary
      Automated fix for issue #{{ steps.extract_issue_id.stdout | trim }}

      ---
      *Generated by Minion Engine*
      ENDOFBODY

  - name: create_pr
    type: cmd
    run: "gh pr create --title 'Minion: Fix #{{ steps.extract_issue_id.stdout | trim }}' --body-file /tmp/pr_body.md"

  - name: result
    type: cmd
    run: "gh pr view --json url -q .url"
